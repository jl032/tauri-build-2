name: Release Tauri App

on:
  push:
    branches:
      - release
      - Vikunja

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install the CLI globally so we don't need a package.json
      - name: Install Tauri CLI Globally
        run: pnpm add -g @tauri-apps/cli

      - name: Fetch Vikunja Logo
        run: |
          # -f makes curl fail if the URL is 404, -L follows redirects
          curl -fL https://raw.githubusercontent.com/go-vikunja/vikunja/main/public/images/logo.svg -o vikunja-logo.svg || \
          curl -fL https://gist.githubusercontent.com/pReya/9ef81bad11f562f9e3b40d2f42ba138c/raw/vikunja.svg -o vikunja-logo.svg

      - name: Verify Logo Content
        run: |
          # Check if the file starts with <svg (if it starts with '404' or '{' it will fail here)
          head -c 10 vikunja-logo.svg | grep "<svg" || (echo "Downloaded file is not a valid SVG" && exit 1)
      
      - name: Generate Tauri Icons
        run: |
          # Now it is safe to run
          tauri icon ./vikunja-logo.svg

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # This tells the action to use the global CLI we just installed
          tauriScript: tauri
          tagName: app-v__VERSION__
          releaseName: 'App v__VERSION__'
          releaseBody: 'Download the installer for your platform below.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
